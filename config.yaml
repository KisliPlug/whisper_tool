# ============================================
# Whisper Screen Tools - config
# ============================================

# Voice typing. Hold to record, release to transcribe and paste.
hotkey: "f21"

# Voice command. Hold to record a command, release to execute it.
# Currently supported: "task kill <name>".
# See app/commands.py for aliases and command parser logic.
command_hotkey: "f19"

# Language forced during command recognition.
# English usually works best for app/process names.
command_language: "en"

# Focus-steal lock. Tap once to block foreground focus stealing;
# tap again to restore the previous Windows timeout.
focus_lock_hotkey: "ctrl+f17"

# Auto-enable focus lock on startup.
focus_lock_auto_enable: true

# Voice recognition language.
# "auto" = auto-detect, restricted to allowed_languages below.
language: "auto"

# Hard allow-list for auto language detection.
allowed_languages:
  - "ru"
  - "en"

# Optional microphone input device override.
# Use null for the Windows default input device.
input_device: null

# Keep the input stream open briefly after recording so Bluetooth
# microphones do not renegotiate on every hotkey press.
input_keepalive_ms: 15000

# Whisper model size: tiny, base, small, medium, large-v3.
model_size: "medium"

# Compute device: auto, cuda, cpu.
device: "auto"

# Compute precision.
# GPU: float16, int8_float16, float32.
# CPU: int8, float32.
compute_type: "float16"

# Beam search width. Higher is usually better and slower.
beam_size: 5

# Audio sample rate in Hz. Whisper expects 16000.
sample_rate: 16000

# Minimum recording duration in seconds.
min_duration: 0.5

# Streaming transcription interval in seconds.
stream_interval: 2.0

# Beep on recording start/stop.
sound_feedback: true

# Text insertion method: clipboard or typing.
insert_mode: "clipboard"


# Screen capture tools.
screen:
  enabled: true

  # Tap once to select a region and start recording.
  # Tap again to stop. Saves GIF, MP4, and frames.png.
  video_hotkey: "f20"

  # Tap once, select a region on a frozen snapshot, save PNG.
  screenshot_hotkey: "f17"

  # Tap once, select a region, open the image annotator.
  # Tap again while the annotator is open to commit and close.
  screenshot_edit_hotkey: "f18"

  # Video frame rate.
  video_fps: 15

  # Output root. Every capture gets a timestamped subfolder.
  # activity.log lives directly in this directory.
  output_dir: "~/Documents/records"
