# ============================================
# Whisper Voice Input + Screen Capture — Config
# ============================================

# ── Voice typing (push-to-talk) ──────────────
# Hold to record, release to transcribe & paste.
hotkey: "f21"

# ── Voice command (push-to-talk) ─────────────
# Hold to record a command, release to execute.
# Currently supported: "task kill <name>" — kills processes whose
# image name contains <name>. See app/commands.py for the alias map
# and to add new commands.
command_hotkey: "f19"

# Language forced during command recognition. English ("en") works
# best even when you say Russian-accented app names because Whisper
# transliterates them to Latin ("revit", "chrome") — the alias map
# becomes a fallback, not the primary path.
command_language: "en"

# ── Focus-steal lock (tap-to-toggle) ─────────
# Tap once to raise Windows' SPI_SETFOREGROUNDLOCKTIMEOUT so apps
# like Revit can't yank foreground focus away from you. Tap again
# to restore the previous timeout. Spec is "mod+mod+…+mainkey";
# supported mods: ctrl, alt, shift, win.
focus_lock_hotkey: "ctrl+f17"

# Auto-enable focus lock on startup so background apps cannot steal
# the foreground until you explicitly turn the protection off.
focus_lock_auto_enable: true

# Recognition language (ISO 639-1)
# "auto" = auto-detect, restricted to allowed_languages below,
# "ru", "en", etc. = force a specific language.
language: "auto"

# Hard allow-list for auto language detection. If Whisper detects anything
# outside this list, the result is discarded and decoded again with each
# allowed language; the best-scoring allowed result is returned.
allowed_languages:
  - "ru"
  - "en"

# Input device for microphone capture. Null = use Windows default input.
# You can set either a device index (more reliable on Windows) or a name.
# Example for Redmi Buds hands-free mic:
# input_device: 28
input_device: null

# Keep the input stream open briefly after recording so Bluetooth
# headsets do not re-negotiate the microphone on every hotkey press.
input_keepalive_ms: 15000

# Whisper model size
# Options: tiny, base, small, medium, large-v3
# Larger = better quality, more VRAM, slower first load
model_size: "medium"

# Compute device: "auto", "cuda", "cpu"
device: "auto"

# Compute precision
# GPU: "float16" (fast, recommended), "int8_float16", "float32"
# CPU: "int8" (fast), "float32"
compute_type: "float16"

# Beam size for decoding (higher = better quality, slower)
beam_size: 5

# Audio sample rate in Hz (16000 is optimal for Whisper)
sample_rate: 16000

# Minimum recording duration in seconds (skips accidental taps)
min_duration: 0.5

# Streaming transcription interval in seconds
stream_interval: 2.0

# Beep on recording start/stop
sound_feedback: true

# Text insertion method: "clipboard" (Shift+Insert) or "typing"
insert_mode: "clipboard"


# ── Screen capture ───────────────────────────
# Independent hotkeys for video (toggle) and screenshot (tap).
# Must not collide with the voice hotkey above.
screen:
  enabled: true

  # Tap once to pick a region and start recording, tap again to stop.
  # Saves GIF + MP4 + labeled PNG frame grid into its own folder.
  video_hotkey: "f20"

  # Tap once, select a region on a frozen snapshot of the primary
  # monitor — any open dropdown/menu stays visible in the picker.
  # Saves a single PNG immediately, no annotator.
  screenshot_hotkey: "f17"

  # Same as above, but after saving opens an annotator window where
  # you can draw strokes. Tap this key again to commit & close;
  # Esc cancels without saving.
  screenshot_edit_hotkey: "f18"

  # Video frames per second (higher = smoother + larger files).
  video_fps: 15

  # Where all captures go. Each capture gets its own timestamped
  # subfolder; activity.log lives directly in output_dir.
  output_dir: "~/Documents/records"
